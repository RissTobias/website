<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>No AI – Just Thoughts</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden; /* keine Scrollbar */
      background: #ffffff;
      color: #000000;
      font-family: "Courier New", Courier, monospace;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .center {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      width: 100%;
      text-align: center;
    }

    #main-link {
      letter-spacing: 0.04em;
      line-height: 1.2;
      font-size: clamp(1.2rem, 1.6vw, 1.6rem);
      padding: 0.5rem 1rem;
      background: transparent;
      border: none;
      cursor: pointer;
      transition: opacity 150ms ease-out;
      text-decoration: none;
      color: inherit;
    }

    #main-link:hover {
      opacity: 0.6;
    }

    #chip {
      display: none; /* erst unsichtbar */
      font-size: 13px;
      line-height: 1.1;
      letter-spacing: 0.12em;
      text-align: center;
      cursor: default;
    }
  </style>
</head>
<body>
  <div class="center">
    <!-- Start-Text -->
    <a href="menu.html" id="main-link">
      No AI.<br><br>
      Just Thoughts.
    </a>

    <!-- Hier wird der Zahlen-Chip per JS aufgebaut -->
    <div id="chip" aria-hidden="true"></div>
  </div>

  <script>
    const mainLink = document.getElementById("main-link");
    const chip = document.getElementById("chip");

    mainLink.addEventListener("click", function (event) {
      event.preventDefault(); // nicht direkt weiterleiten

      // Text ausblenden, Chip einblenden
      mainLink.style.display = "none";
      chip.style.display = "block";

      startChipSequence();
    });

    function startChipSequence() {
      const rows = 11;
      const cols = 18;
      const bits = [];

      // Chip-Gitter aus Spans aufbauen
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          const span = document.createElement("span");
          span.textContent = Math.random() < 0.5 ? "0" : "1";
          chip.appendChild(span);
          bits.push(span);
        }
        chip.appendChild(document.createElement("br"));
      }

      // Lock-Status für Reihen/Spalten
      const lockedRows = new Array(rows).fill(false);
      const lockedCols = new Array(cols).fill(false);
      let lockingActive = false;
      let redirectScheduled = false;

      function updateLocks() {
        if (!lockingActive) return;

        // Reihen prüfen
        for (let r = 0; r < rows; r++) {
          if (lockedRows[r]) continue;
          let allOne = true;
          for (let c = 0; c < cols; c++) {
            if (bits[r * cols + c].textContent !== "1") { allOne = false; break; }
          }
          if (allOne) lockedRows[r] = true;
        }

        // Spalten prüfen
        for (let c = 0; c < cols; c++) {
          if (lockedCols[c]) continue;
          let allOne = true;
          for (let r = 0; r < rows; r++) {
            if (bits[r * cols + c].textContent !== "1") { allOne = false; break; }
          }
          if (allOne) lockedCols[c] = true;
        }

        // Wenn alle Reihen oder alle Spalten gelockt sind → alles auf 1 → weiterleiten
        if (!redirectScheduled && (lockedRows.every(v => v) || lockedCols.every(v => v))) {
          redirectScheduled = true;
          clearInterval(intervalId);
          setTimeout(() => { window.location.href = "menu.html"; }, 500);
        }
      }

      // Alle Bits neu zufällig setzen, gelockte Reihen/Spalten bleiben auf 1
      function randomizeAllBits() {
        for (let r = 0; r < rows; r++) {
          for (let c = 0; c < cols; c++) {
            const idx = r * cols + c;
            if (lockedRows[r] || lockedCols[c]) {
              bits[idx].textContent = "1";
            } else {
              bits[idx].textContent = Math.random() < 0.2 ? "0" : "1";
            }
          }
        }
        updateLocks();
      }

      const intervalId = setInterval(randomizeAllBits, 80);

      // Nach 1 Sekunde: Locking aktivieren
      setTimeout(() => {
        lockingActive = true;
        updateLocks();
      }, 1000);
    }
  </script>
  <script data-goatcounter="https://tobiasriss.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>

</body>
</html>
